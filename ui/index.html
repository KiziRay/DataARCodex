<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>壓縮檔密碼解鎖工具</title>
  
  <!-- Google Fonts: Inter for UI, Fira Code for Terminal -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- Background decorative elements -->
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h2>VGI Unlocker</h2>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" data-target="tab-extract">
          <i class="fa-solid fa-file-export"></i> <span>提取 Hash</span>
        </button>
        <button class="nav-btn" data-target="tab-john">
          <i class="fa-solid fa-user-secret"></i> <span>John 破解</span>
        </button>
        <button class="nav-btn" data-target="tab-hashcat">
          <i class="fa-solid fa-microchip"></i> <span>Hashcat 破解</span>
        </button>
        <button class="nav-btn" data-target="tab-quick">
          <i class="fa-solid fa-bolt"></i> <span>快速模式</span>
        </button>
      </nav>
      
      <div class="sidebar-footer">
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span>系統就緒</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <div>
          <h1>壓縮檔密碼解鎖工具</h1>
          <p>專業級密碼恢復套件 • 支援 ZIP / RAR / 7z</p>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" title="設定"><i class="fa-solid fa-gear"></i></button>
        </div>
      </header>

      <div class="content-area">
        <!-- Tab: Extract -->
        <section id="tab-extract" class="tab-pane active">
          <div class="card">
            <div class="card-header">
              <div class="header-icon"><i class="fa-solid fa-file-export"></i></div>
              <div>
                <h3>1. 提取 Hash (John 工具鏈)</h3>
                <p class="subtitle">從加密的壓縮檔中提取可用於破解的 Hash 簽章</p>
              </div>
            </div>
            <div class="card-body">
              <div class="form-group">
                <label>壓縮檔路徑</label>
                <div class="input-with-icon">
                  <i class="fa-regular fa-file-zipper"></i>
                  <input id="archive" placeholder="C:\target\secret.rar" />
                </div>
              </div>
              <div class="form-group">
                <label>輸出 Hash 檔</label>
                <div class="input-with-icon">
                  <i class="fa-regular fa-file-lines"></i>
                  <input id="hashOut" value="C:\target\hash.txt" />
                </div>
              </div>
              <div class="form-grid">
                <div class="form-group">
                  <label>John 目錄 (可選)</label>
                  <div class="input-with-icon">
                    <i class="fa-solid fa-folder-open"></i>
                    <input id="johnDir" placeholder="C:\tools\john\run" />
                  </div>
                </div>
                <div class="form-group">
                  <label>Perl 路徑 (7z 可選)</label>
                  <div class="input-with-icon">
                    <i class="fa-solid fa-code"></i>
                    <input id="perl" placeholder="C:\Strawberry\perl\bin\perl.exe" />
                  </div>
                </div>
              </div>
              <div class="action-row">
                <button id="btnExtract" class="btn btn-primary btn-glow">
                  <i class="fa-solid fa-play"></i> 開始提取 Hash
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- Tab: John -->
        <section id="tab-john" class="tab-pane">
          <div class="card">
            <div class="card-header">
              <div class="header-icon"><i class="fa-solid fa-user-secret"></i></div>
              <div>
                <h3>2. John 字典破解</h3>
                <p class="subtitle">使用 John the Ripper 引擎進行高效率字典攻擊</p>
              </div>
            </div>
            <div class="card-body">
              <div class="form-group">
                <label>Hash 檔</label>
                <div class="input-with-icon">
                  <i class="fa-regular fa-file-code"></i>
                  <input id="johnHashFile" placeholder="C:\target\hash.txt" />
                </div>
              </div>
              <div class="form-group">
                <label>字典檔 (可選)</label>
                <div class="input-with-icon">
                  <i class="fa-solid fa-book-skull"></i>
                  <input id="johnWordlist" placeholder="C:\wordlists\rockyou.txt" />
                </div>
              </div>
              <div class="form-group">
                <label>john.exe 路徑 (可選)</label>
                <div class="input-with-icon">
                  <i class="fa-solid fa-terminal"></i>
                  <input id="johnExe" placeholder="C:\tools\john\run\john.exe" />
                </div>
              </div>
              <div class="action-row">
                <button id="btnJohn" class="btn btn-primary btn-glow">
                  <i class="fa-solid fa-play"></i> 執行 John 破解
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- Tab: Hashcat -->
        <section id="tab-hashcat" class="tab-pane">
          <div class="card">
            <div class="card-header">
              <div class="header-icon"><i class="fa-solid fa-microchip"></i></div>
              <div>
                <h3>3. Hashcat GPU 破解</h3>
                <p class="subtitle">利用顯示卡 (GPU) 進行極速硬體加速破解</p>
              </div>
            </div>
            <div class="card-body">
              <div class="form-group">
                <label>Hash 檔</label>
                <div class="input-with-icon">
                  <i class="fa-regular fa-file-code"></i>
                  <input id="hcHashFile" placeholder="C:\target\hash.txt" />
                </div>
              </div>
              <div class="form-grid">
                <div class="form-group">
                  <label>模式 -m (Hash Type)</label>
                  <div class="input-with-icon">
                    <i class="fa-solid fa-hashtag"></i>
                    <input id="hcMode" value="13000" />
                  </div>
                </div>
                <div class="form-group">
                  <label>攻擊模式 -a</label>
                  <div class="input-with-icon">
                    <i class="fa-solid fa-crosshairs"></i>
                    <select id="hcAttack" class="select-input">
                      <option value="0">0 - 字典攻擊 (Straight)</option>
                      <option value="3" selected>3 - 遮罩攻擊 (Brute-force)</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="form-grid">
                <div class="form-group">
                  <label>Mask (-a 3 時)</label>
                  <div class="input-with-icon">
                    <i class="fa-solid fa-mask"></i>
                    <input id="hcMask" value="?d?d?d?d?d?d?d?d" />
                  </div>
                </div>
                <div class="form-group">
                  <label>字典 (-a 0 時)</label>
                  <div class="input-with-icon">
                    <i class="fa-solid fa-book"></i>
                    <input id="hcWordlist" placeholder="C:\wordlists\rockyou.txt" />
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label>hashcat.exe 路徑 (可選)</label>
                <div class="input-with-icon">
                  <i class="fa-solid fa-terminal"></i>
                  <input id="hcExe" placeholder="C:\tools\hashcat\hashcat.exe" />
                </div>
              </div>
              <div class="action-row">
                <button id="btnHashcat" class="btn btn-primary btn-glow">
                  <i class="fa-solid fa-fire"></i> 啟動 GPU 破解
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- Tab: Quick -->
        <section id="tab-quick" class="tab-pane">
          <div class="card">
            <div class="card-header">
              <div class="header-icon"><i class="fa-solid fa-bolt"></i></div>
              <div>
                <h3>內建快速模式 (7z 驗證)</h3>
                <p class="subtitle">不依賴外部工具的輕量級內建破解引擎</p>
              </div>
            </div>
            <div class="card-body">
              <div class="form-group">
                <label>壓縮檔</label>
                <div class="input-with-icon">
                  <i class="fa-regular fa-file-zipper"></i>
                  <input id="quickArchive" placeholder="C:\target\secret.zip" />
                </div>
              </div>
              <div class="form-grid">
                <div class="form-group">
                  <label>字典檔</label>
                  <div class="input-with-icon">
                    <i class="fa-solid fa-book"></i>
                    <input id="quickDict" placeholder="C:\wordlists\rockyou.txt" />
                  </div>
                </div>
                <div class="form-group">
                  <label>Mask</label>
                  <div class="input-with-icon">
                    <i class="fa-solid fa-mask"></i>
                    <input id="quickMask" placeholder="?d?d?d?d" />
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label>執行緒數量 (Threads)</label>
                <div class="input-with-icon">
                  <i class="fa-solid fa-network-wired"></i>
                  <input id="quickThreads" type="number" value="8" min="1" max="128" />
                </div>
              </div>
              <div class="action-row">
                <button id="btnQuickDict" class="btn btn-secondary">
                  <i class="fa-solid fa-book-open"></i> 快速字典解鎖
                </button>
                <button id="btnQuickMask" class="btn btn-secondary">
                  <i class="fa-solid fa-unlock-keyhole"></i> 快速 Mask 解鎖
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- Log Section -->
        <div class="log-container">
          <div class="log-header">
            <div class="log-title">
              <i class="fa-solid fa-terminal"></i> 系統終端機
            </div>
            <button id="btnClearLog" class="btn-icon" title="清除終端機"><i class="fa-solid fa-broom"></i></button>
          </div>
          <div class="log-body">
            <pre id="log"></pre>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
